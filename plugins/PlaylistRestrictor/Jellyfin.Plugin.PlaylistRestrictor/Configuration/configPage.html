<!DOCTYPE html>
<html>
<head>
    <title>Playlist Restrictor</title>
</head>
<body>
    <div id="PlaylistRestrictorConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="PlaylistRestrictorConfigForm">
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label class="emby-checkbox-label">
                            <input id="RestrictPlaylistCreation" name="RestrictPlaylistCreation"
                                   type="checkbox" is="emby-checkbox" />
                            <span>Restrict playlist creation to admins only</span>
                        </label>
                        <div class="fieldDescription">
                            When enabled, only administrator users can create new playlists.
                            Non-admin users will receive a 403 Forbidden response.
                        </div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        var PlaylistRestrictorConfig = {
            pluginUniqueId: 'd4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f90'
        };

        document.querySelector('#PlaylistRestrictorConfigPage')
            .addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(PlaylistRestrictorConfig.pluginUniqueId).then(function (config) {
                    document.querySelector('#RestrictPlaylistCreation').checked = config.RestrictPlaylistCreation;
                    Dashboard.hideLoadingMsg();
                });
            });

        document.querySelector('#PlaylistRestrictorConfigForm')
            .addEventListener('submit', function (e) {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(PlaylistRestrictorConfig.pluginUniqueId).then(function (config) {
                    config.RestrictPlaylistCreation = document.querySelector('#RestrictPlaylistCreation').checked;
                    ApiClient.updatePluginConfiguration(PlaylistRestrictorConfig.pluginUniqueId, config).then(function () {
                        Dashboard.processPluginConfigurationUpdateResult();
                    });
                });
                e.preventDefault();
                return false;
            });
    </script>
</body>
</html>
