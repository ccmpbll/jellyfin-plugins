name: Build Plugins

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin:
          - name: PlaylistRestrictor
            path: plugins/PlaylistRestrictor

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore "${{ matrix.plugin.path }}/Jellyfin.Plugin.${{ matrix.plugin.name }}/Jellyfin.Plugin.${{ matrix.plugin.name }}.csproj"

      - name: Build
        run: dotnet build "${{ matrix.plugin.path }}/Jellyfin.Plugin.${{ matrix.plugin.name }}/Jellyfin.Plugin.${{ matrix.plugin.name }}.csproj" -c Release --no-restore

      - name: Package plugin
        run: |
          mkdir -p staging artifacts
          cp ${{ matrix.plugin.path }}/Jellyfin.Plugin.${{ matrix.plugin.name }}/bin/Release/net9.0/Jellyfin.Plugin.${{ matrix.plugin.name }}.dll staging/
          cp ${{ matrix.plugin.path }}/Jellyfin.Plugin.${{ matrix.plugin.name }}/meta.json staging/
          cd staging
          zip -r ../artifacts/${{ matrix.plugin.name }}.zip .
          cd ..
          md5sum artifacts/${{ matrix.plugin.name }}.zip | awk '{print $1}' > artifacts/${{ matrix.plugin.name }}.md5

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.plugin.name }}
          path: artifacts/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip

      - name: Generate manifest
        run: python3 .github/scripts/generate-manifest.py > manifest.json

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: manifest.json
